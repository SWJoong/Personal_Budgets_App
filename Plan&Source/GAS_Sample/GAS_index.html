<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f6f9; padding: 20px; }
    .container { max-width: 800px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .nav-tabs .nav-link.active { font-weight: bold; color: #0d6efd; }
    
    /* 결과 리포트 스타일 */
    #captureArea {
      background-color: white;
      padding: 30px;
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-top: 20px;
    }
    .report-title { text-align: center; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .report-info { margin-bottom: 20px; font-size: 0.95rem; }
    .report-table th { background-color: #f8f9fa; text-align: center; vertical-align: middle; }
    .report-table td { text-align: center; vertical-align: middle; }
    
    /* 리스트 스타일 */
    .search-item { cursor: pointer; transition: background 0.2s; }
    .search-item:hover { background-color: #f1f3f5; }
    
    .loader { display: none; text-align: center; margin-top: 20px; }
    
    /* 화면 전환용 클래스 */
    .view-section { display: none; }
    .view-section.active { display: block; }
  </style>
</head>
<body>

<div class="container">
  <h3 class="text-center mb-4">📋 SIS-A 척도 관리 시스템</h3>

  <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
    <li class="nav-item">
      <button class="nav-link active" id="input-tab" data-bs-toggle="tab" data-bs-target="#input-pane" type="button">새로 입력</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="search-tab" data-bs-toggle="tab" data-bs-target="#search-pane" type="button">기록 보기</button>
    </li>
  </ul>

  <div class="tab-content">
    
    <div class="tab-pane fade show active" id="input-pane">
      <form id="sisForm">
        <div class="mb-3">
          <label class="form-label fw-bold">대상자 성명</label>
          <input type="text" class="form-control" id="name" placeholder="이름 입력" required>
        </div>
        <hr>
        <div class="row g-2">
          <div class="col-6 mb-2"><label>2A 가정생활</label><input type="number" class="form-control text-center" id="raw2A" required></div>
          <div class="col-6 mb-2"><label>2B 지역사회</label><input type="number" class="form-control text-center" id="raw2B" required></div>
          <div class="col-6 mb-2"><label>2C 평생학습</label><input type="number" class="form-control text-center" id="raw2C" required></div>
          <div class="col-6 mb-2"><label>2D 고용활동</label><input type="number" class="form-control text-center" id="raw2D" required></div>
          <div class="col-6 mb-2"><label>2E 보건안전</label><input type="number" class="form-control text-center" id="raw2E" required></div>
          <div class="col-6 mb-2"><label>2F 사회활동</label><input type="number" class="form-control text-center" id="raw2F" required></div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-3 btn-lg">결과 계산</button>
      </form>
    </div>

    <div class="tab-pane fade" id="search-pane">
      
      <div id="searchListSection" class="view-section active">
        <div class="input-group mb-3">
          <input type="text" class="form-control" id="searchInput" placeholder="이름으로 검색">
          <button class="btn btn-outline-secondary" type="button" onclick="loadRecords()">🔍 검색</button>
        </div>
        
        <div class="list-group" id="searchResultList">
          </div>
      </div>

    </div>
  </div>

  <div id="loader" class="loader">
    <div class="spinner-border text-primary" role="status"></div>
    <p>처리 중입니다...</p>
  </div>

  <div id="resultSection" style="display:none;">
    <hr class="my-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5>📊 분석 결과 보고서</h5>
      <div>
        <button id="btnBackToList" class="btn btn-outline-secondary btn-sm me-1" style="display:none;" onclick="backToList()">🔙 목록으로</button>
        <button class="btn btn-success btn-sm" onclick="downloadImage()">💾 이미지 저장</button>
      </div>
    </div>

    <div id="captureArea">
      <h4 class="report-title">지원요구척도(SIS-A) 결과 프로파일</h4>
      
      <div class="report-info row">
        <div class="col-6"><strong>성명:</strong> <span id="resName"></span></div>
        <div class="col-6 text-end"><strong>작성일:</strong> <span id="resDate"></span></div>
      </div>

      <table class="table table-bordered report-table table-sm">
        <thead class="table-light">
          <tr>
            <th>하위 척도 영역</th>
            <th>원점수</th>
            <th>표준점수</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>A. 가정 생활</td><td id="tRaw2A"></td><td id="tStd2A" class="fw-bold"></td></tr>
          <tr><td>B. 지역사회 생활</td><td id="tRaw2B"></td><td id="tStd2B" class="fw-bold"></td></tr>
          <tr><td>C. 평생학습</td><td id="tRaw2C"></td><td id="tStd2C" class="fw-bold"></td></tr>
          <tr><td>D. 고용</td><td id="tRaw2D"></td><td id="tStd2D" class="fw-bold"></td></tr>
          <tr><td>E. 건강 & 안전</td><td id="tRaw2E"></td><td id="tStd2E" class="fw-bold"></td></tr>
          <tr><td>F. 사회</td><td id="tRaw2F"></td><td id="tStd2F" class="fw-bold"></td></tr>
        </tbody>
        <tfoot class="table-group-divider">
          <tr>
            <th colspan="2">표준점수 총점 (합계)</th>
            <th id="tTotalStd" class="text-primary"></th>
          </tr>
          <tr>
            <th colspan="2">SIS-A 지원요구지수</th>
            <th id="tIndexScore" class="text-success"></th>
          </tr>
          <tr>
            <th colspan="2">척도 백분위수 순위</th>
            <th id="tPercentile"></th>
          </tr>
        </tfoot>
      </table>

      <div class="mt-4" style="height: 300px;">
        <canvas id="scoreChart"></canvas>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let chartInstance = null;

  // 1. 탭 이벤트 설정
  var searchTabEl = document.querySelector('#search-tab');
  searchTabEl.addEventListener('shown.bs.tab', function (event) {
    document.getElementById('searchInput').value = ''; 
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('searchListSection').style.display = 'block';
    loadRecords(); // 탭 누르면 자동 로드
  });
  
  // 입력 탭 누르면 결과창 숨김
  document.querySelector('#input-tab').addEventListener('shown.bs.tab', function(e){
    document.getElementById('resultSection').style.display = 'none';
  });

  // 2. 입력 폼 제출 처리
  document.getElementById('sisForm').addEventListener('submit', function(e) {
    e.preventDefault();
    toggleLoader(true);
    document.getElementById('btnBackToList').style.display = 'none'; 
    
    var formData = {
      name: document.getElementById('name').value,
      raw2A: document.getElementById('raw2A').value,
      raw2B: document.getElementById('raw2B').value,
      raw2C: document.getElementById('raw2C').value,
      raw2D: document.getElementById('raw2D').value,
      raw2E: document.getElementById('raw2E').value,
      raw2F: document.getElementById('raw2F').value
    };

    google.script.run.withSuccessHandler(function(res) {
      toggleLoader(false);
      if(res.success) {
        document.getElementById('sisForm').reset(); // 폼 초기화
        renderResult(res.data);
      } else {
        alert("오류가 발생했습니다: " + res.message);
      }
    })
    .withFailureHandler(function(err) {
        toggleLoader(false);
        alert("서버 통신 오류: " + err);
    })
    .processSIS(formData);
  });

  // 3. 기록 목록 불러오기 (핵심 수정 적용)
  function loadRecords() {
    var query = document.getElementById('searchInput').value;
    toggleLoader(true);
    
    google.script.run.withSuccessHandler(function(list) {
      toggleLoader(false);
      var container = document.getElementById('searchResultList');
      container.innerHTML = '';
      
      if(!list || list.length === 0) {
        container.innerHTML = '<div class="text-center p-3 text-muted">저장된 기록이 없습니다.</div>';
        return;
      }

      list.forEach(function(item) {
        let div = document.createElement('a');
        div.className = 'list-group-item list-group-item-action search-item py-3';
        div.style.cursor = 'pointer';
        div.innerHTML = `
          <div class="d-flex w-100 justify-content-between">
            <h5 class="mb-1 fw-bold">${item.name}</h5>
            <small class="text-muted">${item.date}</small>
          </div>
          <p class="mb-1 small">
            지수: <span class="badge bg-success rounded-pill">${item.indexScore}</span>
            <span class="ms-2">백분위: ${item.percentile}</span>
          </p>
        `;
        
        div.onclick = function() { 
          document.getElementById('searchListSection').style.display = 'none'; 
          document.getElementById('btnBackToList').style.display = 'inline-block'; 
          renderResult(item); 
        };
        container.appendChild(div);
      });
    })
    .withFailureHandler(function(err) {
        toggleLoader(false);
        document.getElementById('searchResultList').innerHTML = '<div class="text-danger text-center">데이터 로드 실패</div>';
    })
    .searchSISData(query);
  }
  
  function backToList() {
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('searchListSection').style.display = 'block';
    
    // 뒤로가기 시 차트 메모리 해제
    if(chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
    }
  }

  // 4. 상세 결과 렌더링
  function renderResult(data) {
    document.getElementById('resName').innerText = data.name;
    document.getElementById('resDate').innerText = data.date; // 서버에서 문자열로 옴

    // 데이터 바인딩
    document.getElementById('tRaw2A').innerText = data.raw.p2A; document.getElementById('tStd2A').innerText = data.std.p2A;
    document.getElementById('tRaw2B').innerText = data.raw.p2B; document.getElementById('tStd2B').innerText = data.std.p2B;
    document.getElementById('tRaw2C').innerText = data.raw.p2C; document.getElementById('tStd2C').innerText = data.std.p2C;
    document.getElementById('tRaw2D').innerText = data.raw.p2D; document.getElementById('tStd2D').innerText = data.std.p2D;
    document.getElementById('tRaw2E').innerText = data.raw.p2E; document.getElementById('tStd2E').innerText = data.std.p2E;
    document.getElementById('tRaw2F').innerText = data.raw.p2F; document.getElementById('tStd2F').innerText = data.std.p2F;

    document.getElementById('tTotalStd').innerText = data.total;
    document.getElementById('tIndexScore').innerText = data.indexScore;
    document.getElementById('tPercentile').innerText = data.percentile;

    document.getElementById('resultSection').style.display = 'block';
    
    // 차트 렌더링
    drawChart(data.std);
  }

  function drawChart(std) {
    const ctx = document.getElementById('scoreChart').getContext('2d');
    
    // 기존 차트 파괴 (중복 렌더링 방지)
    if(chartInstance) {
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['가정생활', '지역사회', '평생학습', '고용', '보건안전', '사회'],
        datasets: [{
          label: '표준점수',
          data: [std.p2A, std.p2B, std.p2C, std.p2D, std.p2E, std.p2F],
          borderColor: '#0d6efd',
          backgroundColor: 'rgba(13, 110, 253, 0.2)',
          borderWidth: 2,
          pointRadius: 5,
          pointBackgroundColor: 'white',
          pointBorderColor: '#0d6efd',
          fill: true,
          tension: 0.1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            min: 0, max: 20,
            grid: { color: '#e9ecef' },
            title: { display: true, text: '표준점수' }
          },
          x: { grid: { display: false } }
        },
        plugins: { legend: { display: false } }
      }
    });
  }

  function downloadImage() {
    window.scrollTo(0,0);
    html2canvas(document.getElementById('captureArea')).then(canvas => {
      let link = document.createElement('a');
      link.download = document.getElementById('resName').innerText + '_SIS_결과.png';
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  }

  function toggleLoader(show) {
    document.getElementById('loader').style.display = show ? 'block' : 'none';
  }
</script>

</body>
</html>
